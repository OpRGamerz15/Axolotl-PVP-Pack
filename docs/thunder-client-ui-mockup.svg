<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1222"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="header" x1="420" y1="175" x2="860" y2="175" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B5EF9"/>
      <stop offset="1" stop-color="#00D4FF"/>
    </linearGradient>
    <filter id="shadow" x="380" y="130" width="520" height="430" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="200" cy="120" r="140" fill="#5B5EF9" fill-opacity="0.18"/>
  <circle cx="1090" cy="620" r="180" fill="#00D4FF" fill-opacity="0.16"/>

  <g filter="url(#shadow)">
    <rect x="420" y="150" width="440" height="420" rx="18" fill="#0F1524" fill-opacity="0.93"/>
    <rect x="420" y="150" width="440" height="42" rx="18" fill="url(#header)"/>
    <text x="444" y="177" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="700">Thunder Client</text>
    <text x="444" y="215" fill="#AFC7E9" font-family="Arial, sans-serif" font-size="14">High-performance legit PvP client</text>

    <rect x="444" y="240" width="392" height="84" rx="12" fill="#202B40" fill-opacity="0.9"/>
    <text x="464" y="272" fill="#EAF3FF" font-family="Arial, sans-serif" font-size="14" font-weight="600">Animations: ultra-smooth</text>
    <text x="464" y="295" fill="#AFC7E9" font-family="Arial, sans-serif" font-size="13">Modules loaded: 117</text>

    <text x="444" y="350" fill="#7CC8FF" font-family="Arial, sans-serif" font-size="12" letter-spacing="1">CATEGORIES</text>
    <rect x="444" y="365" width="120" height="32" rx="8" fill="#5B5EF9"/>
    <text x="476" y="386" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="700">Render</text>
    <rect x="572" y="365" width="90" height="32" rx="8" fill="#263247"/>
    <text x="601" y="386" fill="#D6E5FF" font-family="Arial, sans-serif" font-size="13">HUD</text>
    <rect x="670" y="365" width="140" height="32" rx="8" fill="#263247"/>
    <text x="690" y="386" fill="#D6E5FF" font-family="Arial, sans-serif" font-size="13">Performance</text>

    <rect x="444" y="420" width="392" height="126" rx="12" fill="#111A2A"/>
    <text x="464" y="447" fill="#EAF3FF" font-family="Arial, sans-serif" font-size="13">• Motion Blur</text>
    <text x="464" y="471" fill="#EAF3FF" font-family="Arial, sans-serif" font-size="13">• Clear Water</text>
    <text x="464" y="495" fill="#EAF3FF" font-family="Arial, sans-serif" font-size="13">• Crosshair+</text>
    <text x="464" y="519" fill="#EAF3FF" font-family="Arial, sans-serif" font-size="13">• Cinematic Transitions</text>
  </g>

  <text x="24" y="694" fill="#8FA8D1" font-family="Arial, sans-serif" font-size="12">Concept mockup of Thunder Client ClickGUI (Fabric mod)</text>
</svg>
